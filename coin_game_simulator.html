<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硬币投掷策略模拟器 (凯利公式游戏)</title>
    <!-- 引入 Chart.js 用于绘制精美的图表 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 {
            color: #1a365d;
            font-size: 24px;
        }

        .btn-refresh {
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: bold;
        }

        .btn-refresh:hover {
            background-color: #2b6cb0;
        }

        /* 布局系统 */
        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
        }

        /* 左侧硬币试验记录 */
        .left-panel {
            background: #f7fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            padding: 15px;
            max-height: 850px;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 16px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 8px;
        }

        .coin-grid {
            display: grid;
            grid-template-columns: 60px repeat(5, 1fr);
            gap: 6px;
            align-items: center;
            font-size: 12px;
        }

        .grid-header {
            font-weight: bold;
            color: #4a5568;
            text-align: center;
            padding: 4px 0;
            background: #edf2f7;
            border-radius: 4px;
        }

        .exp-num {
            font-weight: bold;
            color: #718096;
            text-align: center;
        }

        .coin-cell {
            text-align: center;
            padding: 6px 0;
            border-radius: 4px;
            font-weight: 500;
        }

        .coin-head {
            background-color: #fed7d7;
            color: #c53030;
        }

        .coin-tail {
            background-color: #ebf8ff;
            color: #2b6cb0;
        }

        /* 右侧控制与数据大盘 */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 上部参数设置与统计 */
        .top-stats-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .rule-info {
            margin-top: 10px;
            font-size: 13px;
            color: #4a5568;
            line-height: 1.5;
            background: #ebf8ff;
            padding: 8px;
            border-radius: 4px;
            border-left: 4px solid #3182ce;
        }

        /* 仓位滑动条样式 */
        .slider-group {
            margin-top: 12px;
        }
        .slider-container {
            margin-bottom: 12px;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .custom-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #e2e8f0;
            outline: none;
        }

        /* 中部策略对比表格 */
        .strategy-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }

        .strategy-table th, .strategy-table td {
            border: 1px solid #e2e8f0;
            padding: 10px;
            text-align: center;
        }

        .strategy-table th {
            background-color: #f7fafc;
            color: #4a5568;
            font-weight: 600;
        }

        .highlight-row {
            background-color: #f0fff4;
            font-weight: bold;
            color: #22543d;
        }

        /* 下部图表区布局 */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 20px;
        }

        .chart-container {
            position: relative;
            height: 280px;
            width: 100%;
        }

        .bar-chart-container {
            grid-column: span 2;
            height: 260px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>🪙 硬币投掷与仓位投注模拟器 (凯利公式演示)</h1>
        </div>
        <button class="btn-refresh" onclick="runExperiment()">🎲 刷新游戏 (全新100次投掷)</button>
    </header>

    <div class="main-layout">
        <!-- 左侧：100次实验结果 -->
        <div class="left-panel">
            <div class="panel-title">100次实验随机结果明细</div>
            <div class="coin-grid" id="coinGrid">
                <!-- 动态生成表头和100次结果 -->
            </div>
        </div>

        <!-- 右侧：控制仓位、数据统计与图表展示 -->
        <div class="right-panel">
            
            <!-- 上部：参数配置与概率统计 -->
            <div class="top-stats-box">
                <!-- 赔率与仓位设置 -->
                <div class="card">
                    <div style="font-weight: bold; font-size: 15px; margin-bottom: 10px; color:#2c5282;">⚙️ 模拟规则与自定义仓位</div>
                    <div class="rule-info">
                        <strong>游戏规则：</strong>初始本金为 100。每次投出<strong>正面</strong>获得 2 倍投注额(净赚2倍)；投出<strong>反面</strong>损失全部投注额。
                    </div>
                    
                    <div class="slider-group">
                        <div class="slider-container">
                            <div class="slider-label">
                                <span>自定义策略投注比例:</span>
                                <span id="customBetVal" style="color:#3182ce; font-weight:bold;">25%</span>
                            </div>
                            <input type="range" id="customBetSlider" class="custom-slider" min="1" max="99" value="25" oninput="updateCustomBet(this.value)">
                        </div>
                    </div>
                </div>

                <!-- 结果统计表格 -->
                <div class="card" style="display: flex; flex-direction: column; justify-content: space-between;">
                    <div style="font-weight: bold; font-size: 15px; margin-bottom: 8px; color:#2c5282;">📊 各策略最终收益对比</div>
                    <table class="strategy-table">
                        <thead>
                            <tr>
                                <th>策略类型</th>
                                <th>下注比例</th>
                                <th>最终资产倍数</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>保守策略</td>
                                <td>1%</td>
                                <td id="td-conservative">1.00倍</td>
                            </tr>
                            <tr>
                                <td>中性策略</td>
                                <td>10%</td>
                                <td id="td-moderate">1.00倍</td>
                            </tr>
                            <tr class="highlight-row" id="row-custom">
                                <td>自定义策略</td>
                                <td id="td-custom-rate">25%</td>
                                <td id="td-custom-res">1.00倍</td>
                            </tr>
                            <tr>
                                <td>激进策略</td>
                                <td>50%</td>
                                <td id="td-aggressive">1.00倍</td>
                            </tr>
                            <tr>
                                <td>满仓暴毙</td>
                                <td>100%</td>
                                <td id="td-allin">0.00倍</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 中下部：图表可视化区 -->
            <div class="charts-grid">
                <!-- 左：正反面比例圆饼图 -->
                <div class="card">
                    <div style="font-weight: bold; font-size: 14px; margin-bottom: 10px; text-align: center;">🎯 正反面出现比例统计</div>
                    <div class="chart-container">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>

                <!-- 右：账户总积分/资产曲线 -->
                <div class="card">
                    <div style="font-weight: bold; font-size: 14px; margin-bottom: 10px; text-align: center;">📈 关键策略账户资产净值增长曲线</div>
                    <div class="chart-container">
                        <canvas id="lineChart"></canvas>
                    </div>
                </div>

                <!-- 下：不同仓位下的最终积分条形图 -->
                <div class="card bar-chart-container">
                    <div style="font-weight: bold; font-size: 14px; margin-bottom: 5px; text-align: center;">📊 不同仓位投注比例下的最终资产倍数对比 (1% - 90%)</div>
                    <div style="height: 210px; width: 100%;">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // 全局变量保存当前100次投掷结果 (1表示正面，0表示反面)
    let coinResults = [];
    
    // 图表实例引用
    let pieChartInstance = null;
    let lineChartInstance = null;
    let barChartInstance = null;

    // 页面首次加载初始化
    window.onload = function() {
        runExperiment();
    };

    // 响应滑动条变动
    function updateCustomBet(val) {
        document.getElementById('customBetVal').innerText = val + '%';
        document.getElementById('td-custom-rate').innerText = val + '%';
        // 动态重新计算并更新，不刷新随机硬币序列
        recalculateAndRender();
    }

    // 主运行函数：生成全新100次投掷，并计算图表
    function runExperiment() {
        coinResults = [];
        for (let i = 0; i < 100; i++) {
            // 50% 概率正反面
            coinResults.push(Math.random() < 0.5 ? 1 : 0);
        }

        // 渲染左侧网页格子明细
        renderCoinGrid();
        
        // 核心计算与图表绘制
        recalculateAndRender();
    }

    // 渲染左侧硬币明细表格 (模仿图中5个一组的展示模式)
    function renderCoinGrid() {
        const grid = document.getElementById('coinGrid');
        grid.innerHTML = ''; // 清空

        // 添加网格表头
        grid.appendChild(createCell('序号', 'grid-header'));
        for(let h=1; h<=5; h++) {
            grid.appendChild(createCell(`第${h}次`, 'grid-header'));
        }

        // 每行显示5个，共20行展示100次结果
        for (let row = 0; row < 20; row++) {
            const expNum = (row + 1) * 5; // 对应第5, 10, 15次...
            grid.appendChild(createCell(expNum, 'exp-num'));

            for (let col = 0; col < 5; col++) {
                const index = row * 5 + col;
                const isHead = coinResults[index] === 1;
                const cellClass = isHead ? 'coin-cell coin-head' : 'coin-cell coin-tail';
                const cellText = isHead ? '正面' : '反面';
                grid.appendChild(createCell(cellText, cellClass));
            }
        }
    }

    function createCell(text, className) {
        const div = document.createElement('div');
        div.className = className;
        div.innerText = text;
        return div;
    }

    // 核心计算与数据更新逻辑
    function recalculateAndRender() {
        // 1. 统计正反面数量
        let headsCount = 0;
        let tailsCount = 0;
        coinResults.forEach(res => {
            if (res === 1) headsCount++;
            else tailsCount++;
        });

        // 2. 获取用户自定义的投注百分比
        const customRate = parseFloat(document.getElementById('customBetSlider').value) / 100;

        // 定义要跟踪和展示完整资产曲线的四种主要策略
        // 规则：赢了获得 投注额*2 的利润，输了损失投注额
        const strategies = {
            conservative: { rate: 0.01, balance: 100, history: [100] },
            moderate:     { rate: 0.10, balance: 100, history: [100] },
            custom:       { rate: customRate, balance: 100, history: [100] },
            aggressive:   { rate: 0.50, balance: 100, history: [100] },
            allin:        { rate: 1.00, balance: 100, history: [100] }
        };

        // 模拟100次复利投注过程
        for (let i = 0; i < 100; i++) {
            const isHead = coinResults[i] === 1;
            
            for (let key in strategies) {
                let strat = strategies[key];
                if (strat.balance > 0) {
                    let betAmount = strat.balance * strat.rate;
                    if (isHead) {
                        strat.balance += betAmount * 2; // 净赚2倍赔率
                    } else {
                        strat.balance -= betAmount;     // 输掉下注金额
                        if (strat.balance < 0.01) strat.balance = 0; // 破产保护
                    }
                } else {
                    strat.balance = 0;
                }
                strat.history.push(strat.balance);
            }
        }

        // 3. 更新表格文本数据展示 (转化为原始本信100的倍数)
        document.getElementById('td-conservative').innerText = (strategies.conservative.balance / 100).toFixed(2) + ' 倍';
        document.getElementById('td-moderate').innerText = (strategies.moderate.balance / 100).toFixed(2) + ' 倍';
        document.getElementById('td-custom-res').innerText = (strategies.custom.balance / 100).toFixed(2) + ' 倍';
        document.getElementById('td-aggressive').innerText = (strategies.aggressive.balance / 100).toFixed(2) + ' 倍';
        document.getElementById('td-allin').innerText = (strategies.allin.balance / 100).toFixed(2) + ' 倍';

        // 4. 计算下方的条形图数据：不同仓位（1%到90%，步长5%）的最终资产收益
        let barLabels = [];
        let barData = [];
        for (let r = 5; r <= 85; r += 5) {
            barLabels.push(r + '%');
            let tempBalance = 100;
            let currentRate = r / 100;
            for (let i = 0; i < 100; i++) {
                if (tempBalance <= 0) break;
                let bet = tempBalance * currentRate;
                if (coinResults[i] === 1) {
                    tempBalance += bet * 2;
                } else {
                    tempBalance -= bet;
                }
            }
            barData.push(tempBalance / 100); // 存入倍数
        }

        // --- 绘制或刷新 Chart.js 图表 ---

        // ① 饼图：正反面比例统计
        if (pieChartInstance) {
            pieChartInstance.data.datasets[0].data = [headsCount, tailsCount];
            pieChartInstance.update();
        } else {
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            pieChartInstance = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: ['正面 (赢)', '反面 (输)'],
                    datasets: [{
                        data: [headsCount, tailsCount],
                        backgroundColor: ['#f56565', '#4299e1'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        // ② 折线图：主要策略总积分复利曲线趋势
        // 只筛选投掷的次数轴 (0到100)
        let lineLabels = Array.from({length: 101}, (_, i) => i);
        if (lineChartInstance) {
            lineChartInstance.data.datasets[0].data = strategies.conservative.history;
            lineChartInstance.data.datasets[1].data = strategies.moderate.history;
            lineChartInstance.data.datasets[2].data = strategies.custom.history;
            lineChartInstance.data.datasets[3].data = strategies.aggressive.history;
            lineChartInstance.update();
        } else {
            const ctxLine = document.getElementById('lineChart').getContext('2d');
            lineChartInstance = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: lineLabels,
                    datasets: [
                        { label: '保守 (1%)', data: strategies.conservative.history, borderColor: '#48bb78', borderWidth: 2, fill: false, pointRadius: 0 },
                        { label: '中性 (10%)', data: strategies.moderate.history, borderColor: '#4299e1', borderWidth: 2, fill: false, pointRadius: 0 },
                        { label: `自定义 (${Math.round(customRate*100)}%)`, data: strategies.custom.history, borderColor: '#ecc94b', borderWidth: 3, fill: false, pointRadius: 0 },
                        { label: '激进 (50%)', data: strategies.aggressive.history, borderColor: '#e53e3e', borderWidth: 2, fill: false, pointRadius: 0 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            type: 'linear',
                            title: { display: true, text: '账户资产净值 (初始100)' }
                        },
                        x: {
                            title: { display: true, text: '投掷次数' }
                        }
                    },
                    plugins: {
                        legend: { position: 'top', labels: { boxWidth: 12 } }
                    }
                }
            });
        }
        // 更新自定义策略在图表上的动态标签名
        lineChartInstance.data.datasets[2].label = `自定义 (${Math.round(customRate*100)}%)`;
        lineChartInstance.update();

        // ③ 条形图：不同仓位最终资产对比
        if (barChartInstance) {
            barChartInstance.data.datasets[0].data = barData;
            barChartInstance.update();
        } else {
            const ctxBar = document.getElementById('barChart').getContext('2d');
            barChartInstance = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: barLabels,
                    datasets: [{
                        label: '最终资产增长倍数',
                        data: barData,
                        backgroundColor: barData.map((_, i) => {
                            // 给不同的仓位区间上色，直观看出哪里收益最高（通常在20%-30%之间即凯利最优仓位达到顶峰）
                            return '#4299e1';
                        }),
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: { display: true, text: '倍数 (对数级建议)' }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }
    }
</script>

</body>
</html>
